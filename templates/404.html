<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AgriTech custom 404 page not found." />
  <title>404 - Page Not Found | AgriTech</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&family=Libertinus+Serif:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-color: #081019;
      --panel: rgba(13, 17, 23, 0.82);
      --panel-strong: rgba(21, 29, 39, 0.96);
      --text-color: #f8fafc;
      --text-muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Open Sans", sans-serif;
      color: var(--text-color);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 24%),
        linear-gradient(180deg, #060b12 0%, #0b1220 100%);
      overflow-x: hidden;
    }

    .page-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      position: relative;
      isolation: isolate;
    }

    .page-shell::before,
    .page-shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(24px);
      opacity: 0.7;
      z-index: -1;
    }

    .page-shell::before {
      width: 240px;
      height: 240px;
      background: rgba(34, 197, 94, 0.18);
      top: 8%;
      left: 10%;
      animation: float 14s ease-in-out infinite;
    }

    .page-shell::after {
      width: 320px;
      height: 320px;
      background: rgba(59, 130, 246, 0.12);
      right: 8%;
      bottom: 6%;
      animation: float 18s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(21, 29, 39, 0.98), rgba(13, 17, 23, 0.96));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 36px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 35%);
      pointer-events: none;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.24), rgba(22, 163, 74, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .brand-mark img {
      width: 34px;
      height: 34px;
      object-fit: cover;
    }

    .brand-copy h1 {
      margin: 0;
      font-family: "Libertinus Serif", serif;
      font-size: 1.35rem;
      letter-spacing: 0.02em;
    }

    .brand-copy p {
      margin: 2px 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .hero {
      display: grid;
      gap: 18px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.22);
      color: #bbf7d0;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    .headline {
      margin: 0;
      font-family: "Libertinus Serif", serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      line-height: 0.98;
    }

    .headline span {
      color: #86efac;
    }

    .message {
      margin: 0;
      color: var(--text-muted);
      max-width: 58ch;
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .path-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: #e2e8f0;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #07130b;
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.25);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text-color);
    }

    .helper-row {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .helper-row a {
      color: #86efac;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px;
        border-radius: 22px;
      }

      .brand-row {
        align-items: flex-start;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="card" aria-labelledby="page-title">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">
          <img src="/images/logo.png" alt="" />
        </div>
        <div class="brand-copy">
          <h1>AgriTech</h1>
          <p>Smart Agriculture for a Sustainable Future</p>
        </div>
      </div>

      <div class="hero">
        <div class="status"><i class="fa-solid fa-triangle-exclamation"></i> 404</div>
        <h2 class="headline" id="page-title">Page <span>Not Found</span></h2>
        <p class="message">
          The page you’re looking for doesn’t exist, may have been moved, or the link may be broken.
          Use the buttons below to get back on track.
        </p>
        <div class="path-chip"><i class="fa-solid fa-link"></i> {{ requested_path }}</div>

        <div class="actions">
          <button type="button" class="btn btn-secondary" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i> Go Back
          </button>
          <a class="btn btn-primary" href="/index.html">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </div>

        <div class="helper-row">
          Try the <a href="/index.html">homepage</a> or return to the previous page.
        </div>
      </div>
    </section>
  </main>
</body>
</html>
